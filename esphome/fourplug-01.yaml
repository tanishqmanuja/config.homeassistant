substitutions:
  device_name: fourplug01
  friendly_name: Four Plug 01

  rf:
    gpio: GPIO16
    protocol: 6
    special_codes:
      all_on:   '011111110000011100011110'
      all_off:  '011100100000100000010100'
    filters:
      - settle: 250ms

  plugs:
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
    mapping:
      - gpio: GPIO27
        code: '010001110011111000101001'
      - gpio: GPIO26
        code: '011111010000010100011101'
      - gpio: GPIO33
        code: '010111000010010000111100'
      - gpio: GPIO32
        code: '011110100000000000011000'


packages:
  base: !include ./common/base.yaml
  board: !include ./common/board/esp32dev.idf.yaml
  wifi.stable: !include ./common/wifi/stable.yaml
  rf.plugs: !include ./devices/fourplug/rf.plugs.yaml

preferences:
  flash_write_interval: 5s

remote_receiver:
  id: rf_receiver
  pin:
    number: ${ rf.gpio }
    mode:
      input: true
      pullup: true
    inverted: true
  tolerance: 50%
  filter: 100us
  idle: 4ms

binary_sensor:
  - &wall_switch
    platform: gpio
    id: wall_switch_1
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms
    on_state:
      - if:
          condition:
            binary_sensor.is_on: wall_switch_1
          then:
            - switch.turn_on: plug_1
          else:
            - switch.turn_off: plug_1

  # Switch 2
  - <<: *wall_switch
    id: wall_switch_2
    pin:
      number: GPIO21
      mode: INPUT_PULLUP
      inverted: true
    on_state:
      - if:
          condition:
            binary_sensor.is_on: wall_switch_2
          then:
            - switch.turn_on: plug_2
          else:
            - switch.turn_off: plug_2

  - <<: *wall_switch
    id: wall_switch_3
    pin:
      number: GPIO18
      mode: INPUT_PULLUP
      inverted: true
    on_state:
      - if:
          condition:
            binary_sensor.is_on: wall_switch_3
          then:
            - switch.turn_on: plug_3
          else:
            - switch.turn_off: plug_3

  - <<: *wall_switch
    id: wall_switch_4
    pin:
      number: GPIO19
      mode: INPUT_PULLUP
      inverted: true
    on_state:
      - if:
          condition:
            binary_sensor.is_on: wall_switch_4
          then:
            - switch.turn_on: plug_4
          else:
            - switch.turn_off: plug_4