substitutions:
  device_name: dimled02
  friendly_name: DimLED 02
  default_brightness: 50%

  # RSSI Effect
  min_brightness: "0.05"    # lowest brightness (weak RSSI)
  max_brightness: "1.0"     # highest brightness (strong RSSI)
  min_delay: "100"          # fastest flash period in ms (weak RSSI)
  max_delay: "1000"         # slowest flash period in ms (strong RSSI)

packages:
  base: !include ./common/base.yaml
  board: !include ./common/board/esp01.yaml
  uart.disable: !include ./common/logger/disable.uart.yaml
  wifi.stable: !include ./common/wifi/stable.yaml
  wifi.no-reboot: !include ./common/wifi/no-reboot.yaml
  api.no-reboot: !include ./common/api/no-reboot.yaml

esp8266:
  restore_from_flash: false
  early_pin_init: false

esphome:
  comment: DimLED Mark II
  project:
      name: TQLabs.DimLED
      version: "2.0.0"
  on_boot:
    - priority: 350
      then:
      - light.turn_on:
          id: led_builtin
          effect: blink

wifi:
  on_connect:
    then:
      - light.turn_on:
          id: led_builtin
          effect: "None"
      - light.turn_on:
          id: led_strip
          effect: RSSI
  on_disconnect:
    then:
      - light.turn_on:
          id: led_builtin
          effect: blink
      - light.turn_off: led_strip

output:
  - platform: gpio
    id: led_builtin_output
    pin:
      number: GPIO1
      inverted: true
  - platform: esp8266_pwm
    id: led_strip_output
    pin:
      number: GPIO3
      inverted: false
    frequency: 1000Hz
    zero_means_zero: true

sensor:
  - platform: wifi_signal
    id: rssi
    name: RSSI
    entity_category: "diagnostic"
    update_interval: 2s

light:
  - platform: binary
    id: led_builtin
    output: led_builtin_output
    effects:
      - strobe:
          name: blink
          colors:
            - state: true
              brightness: 50% 
              duration: 150ms
            - state: false
              duration: 150ms 

  - platform: monochromatic
    output: led_strip_output
    id: led_strip
    name: LED Strip
    restore_mode: ALWAYS_OFF
    gamma_correct: 1.8
    default_transition_length: 0.75s
    effects:
      - lambda: !include common/light/monochromatic/effects/rssi.yaml

binary_sensor:
  - platform: gpio
    id: boot_button
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_click:
      - min_length: 50ms
        max_length: 500ms
        then:
          - light.toggle: led_strip